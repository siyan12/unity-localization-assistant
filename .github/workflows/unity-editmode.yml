name: Unity EditMode tests

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  UNITY_ARTIFACTS_PATH: artifacts/unity-editmode

jobs:
  editmode:
    name: Unity 2022.3.62f3 EditMode
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Unity license configuration
        shell: pwsh
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UNITY_LICENSE)) {
            throw "::error::Missing required repository secret UNITY_LICENSE. Configure the Unity license before running this workflow."
          }

      - name: Import package, compile, and run EditMode tests
        id: unity-tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Tests/UnityProject
          unityVersion: 2022.3.62f3
          testMode: editmode
          artifactsPath: ${{ env.UNITY_ARTIFACTS_PATH }}

      - name: Verify tests were discovered and passed
        shell: pwsh
        run: >-
          ./scripts/Assert-UnityTestResults.ps1
          -ResultsPath '${{ env.UNITY_ARTIFACTS_PATH }}'

      - name: Upload Unity logs and test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-results
          path: ${{ env.UNITY_ARTIFACTS_PATH }}
          if-no-files-found: warn
