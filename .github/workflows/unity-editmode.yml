name: Unity EditMode tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  editmode:
    name: Unity 2022.3.62f3 EditMode
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Import package, compile, and run EditMode tests
        id: unity-tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Tests/UnityProject
          unityVersion: 2022.3.62f3
          testMode: editmode
          artifactsPath: artifacts/unity-editmode

      - name: Verify tests were discovered and passed
        shell: pwsh
        run: >-
          ./scripts/Assert-UnityTestResults.ps1
          -ResultsPath '${{ steps.unity-tests.outputs.artifactsPath }}'

      - name: Upload Unity logs and test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-results
          path: ${{ steps.unity-tests.outputs.artifactsPath }}
          if-no-files-found: warn
